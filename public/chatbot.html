<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --secondary-gradient: linear-gradient(135deg, #f472b6, #db2777);
            --bg-color: #ffffff;
            --chat-bg: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --bot-message-bg: #f1f5f9;
            --user-message-bg: #818cf8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --bot-message-bg: #334155;
            --user-message-bg: #6366f1;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:
                "Inter",
                -apple-system,
                BlinkMacSystemFont,
                sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .bot-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 1.25rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background-color: var(--bot-message-bg);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background-color: var(--chat-bg);
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: messageAppear 0.5s ease forwards;
        }

        @keyframes messageAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            margin-right: 1rem;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            box-shadow: var(--shadow-md);
        }

        .user-message .avatar {
            background: var(--secondary-gradient);
        }

        .message-bubble {
            max-width: 70%;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-sm);
            line-height: 1.5;
            position: relative;
        }

        .message-content p,
        .message-content ul,
        .message-content ol,
        .message-content pre,
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content blockquote {
            margin: 0 0 0.85rem;
        }

        .message-content p:last-child,
        .message-content ul:last-child,
        .message-content ol:last-child,
        .message-content pre:last-child,
        .message-content blockquote:last-child {
            margin-bottom: 0;
        }

        .message-content ul,
        .message-content ol {
            padding-left: 1.2rem;
        }

        .message-content li+li {
            margin-top: 0.35rem;
        }

        .message-content h1,
        .message-content h2,
        .message-content h3 {
            line-height: 1.3;
            font-weight: 700;
        }

        .message-content h1 {
            font-size: 1.1rem;
        }

        .message-content h2 {
            font-size: 1rem;
        }

        .message-content h3 {
            font-size: 0.95rem;
        }

        .message-content code {
            font-family: Consolas, "Courier New", monospace;
            background: rgba(15, 23, 42, 0.08);
            padding: 0.1rem 0.35rem;
            border-radius: 0.35rem;
            font-size: 0.92em;
        }

        .user-message .message-content code {
            background: rgba(255, 255, 255, 0.18);
        }

        .message-content pre {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 0.8rem;
            padding: 0.9rem 1rem;
            overflow-x: auto;
        }

        .message-content pre code {
            background: transparent;
            padding: 0;
        }

        .message-content blockquote {
            padding-left: 0.85rem;
            border-left: 3px solid #94a3b8;
            color: var(--text-secondary);
        }

        .bot-message .message-bubble {
            background-color: var(--bot-message-bg);
            border-top-left-radius: 0;
        }

        .user-message {
            flex-direction: row-reverse;
        }

        .user-message .avatar {
            margin-right: 0;
            margin-left: 1rem;
        }

        .user-message .message-bubble {
            background: var(--user-message-bg);
            color: white;
            border-top-right-radius: 0;
        }

        .typing-indicator {
            display: none;
            padding: 1rem 1.5rem;
            background-color: #f8fafc;
            border-radius: 0;
            width: fit-content;
            margin-left: 0;
            box-shadow: var(--shadow-sm);
            width: 100%;
        }

        .typing-dots {
            display: flex;
            gap: 0.4rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typingBounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        .input-container {
            padding: 1.5rem;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            background-color: var(--chat-bg);
            border-radius: 1rem;
            padding: 0.5rem;
            box-shadow: var(--shadow-sm);
        }

        .message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            background: none;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .message-input:focus {
            outline: none;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
        }

        .action-button {
            background: none;
            border: none;
            padding: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            background-color: var(--bot-message-bg);
            color: var(--text-primary);
        }

        .send-button {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .container {
                height: 100dvh;
            }

            .header-title h1 {
                font-size: 1.25rem;
            }

            .chat-container {
                padding: 1rem;
            }

            .message-bubble {
                max-width: 85%;
            }

            .input-container {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-title">
                <h1>Vikas's Assistant</h1>
                <div class="bot-status">
                    <div class="status-indicator"></div>
                    <span>Online</span>
                </div>
            </div>
            <div class="controls">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <div class="chat-container" id="chatContainer">
            <!-- Messages will be added here -->
        </div>

        <div class="typing-indicator">
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" class="message-input" placeholder="Type your message..."
                    aria-label="Message input" />
                <div class="action-buttons">
                    <button class="action-button" aria-label="Add attachment">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <button class="action-button" aria-label="Voice input">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="send-button">
                        <span>Send</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {

        let backendUrl = "/agent?message=";
        let input = document.querySelector(".message-input");
        let sendButton = document.querySelector(".send-button");
        let typingIndicator = document.querySelector(".typing-indicator");
        let chatContainer = document.querySelector("#chatContainer");

        const escapeHtml = (value) =>
            (value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");

        const normalizeAssistantText = (text) =>
            (text || "")
                .replace(/\r/g, "")
                .replace(/([.!?])\s+(?=\d+\.\s)/g, "$1\n")
                .replace(/\s*(\d+\.\s+\*\*)/g, "\n$1")
                .replace(/\s*(\d+\.\s+[A-Z])/g, "\n$1")
                .replace(/\s*(-\s+)/g, "\n$1")
                .replace(/\*\*([^*]+)\*\*:/g, "\n**$1**:")
                .replace(/\n{3,}/g, "\n\n")
                .trim();

        const parseInlineMarkdown = (text) =>
            text
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/\*(.+?)\*/g, "<em>$1</em>");

        const formatAssistantMessage = (message) => {
            const normalized = normalizeAssistantText(message);
            const safeMessage = escapeHtml(normalized);
            const lines = safeMessage.split("\n");
            const blocks = [];
            let paragraph = [];
            let listItems = [];
            let listType = null;
            let codeLines = [];
            let inCode = false;

            const flushParagraph = () => {
                if (!paragraph.length) return;
                blocks.push(`<p>${parseInlineMarkdown(paragraph.join("<br>"))}</p>`);
                paragraph = [];
            };

            const flushList = () => {
                if (!listItems.length) return;
                blocks.push(`<${listType}>${listItems.join("")}</${listType}>`);
                listItems = [];
                listType = null;
            };

            const flushCode = () => {
                if (!codeLines.length) return;
                blocks.push(`<pre><code>${codeLines.join("\n")}</code></pre>`);
                codeLines = [];
            };

            for (const line of lines) {
                const trimmed = line.trim();

                if (trimmed.startsWith("```")) {
                    flushParagraph();
                    flushList();
                    if (inCode) {
                        flushCode();
                    }
                    inCode = !inCode;
                    continue;
                }

                if (inCode) {
                    codeLines.push(line);
                    continue;
                }

                if (!trimmed) {
                    flushParagraph();
                    flushList();
                    continue;
                }

                const headingMatch = trimmed.match(/^(#{1,3})\s+(.*)$/);
                if (headingMatch) {
                    flushParagraph();
                    flushList();
                    const level = headingMatch[1].length;
                    blocks.push(`<h${level}>${parseInlineMarkdown(headingMatch[2])}</h${level}>`);
                    continue;
                }

                const orderedMatch = trimmed.match(/^\d+\.\s+(.*)$/);
                if (orderedMatch) {
                    flushParagraph();
                    if (listType !== "ol") {
                        flushList();
                        listType = "ol";
                    }
                    listItems.push(`<li>${parseInlineMarkdown(orderedMatch[1])}</li>`);
                    continue;
                }

                const bulletMatch = trimmed.match(/^[-*]\s+(.*)$/);
                if (bulletMatch) {
                    flushParagraph();
                    if (listType !== "ul") {
                        flushList();
                        listType = "ul";
                    }
                    listItems.push(`<li>${parseInlineMarkdown(bulletMatch[1])}</li>`);
                    continue;
                }

                const quoteMatch = trimmed.match(/^&gt;\s?(.*)$/);
                if (quoteMatch) {
                    flushParagraph();
                    flushList();
                    blocks.push(`<blockquote>${parseInlineMarkdown(quoteMatch[1])}</blockquote>`);
                    continue;
                }

                flushList();
                paragraph.push(trimmed);
            }

            flushParagraph();
            flushList();
            flushCode();

            return blocks.join("");
        };

        const formatMessage = (message, type) => {
            if (type === "user") {
                return `<p>${escapeHtml(message).replace(/\n/g, "<br>")}</p>`;
            }

            return formatAssistantMessage(message);
        };

        const appendMessage = (message, type) => {
            let avatar = type === "user" ? "U" : "B";
            let messageHtml = `
                <div class="message ${type}-message">
                    <div class="avatar">${avatar}</div>
                    <div class="message-bubble">
                        <div class="message-content">${formatMessage(message, type)}</div>
                    </div>
                </div>
            `;

            chatContainer.insertAdjacentHTML("beforeend", messageHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        const userMessageSendToBackend = async (message) => {
            const response = await fetch(backendUrl + encodeURIComponent(message), {
                method: "GET",
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || "Request failed");
            }

            return response.json();
        };

        const sendMessage = async () => {
            let message = input.value.trim();

            if (!message) {
                return;
            }

            appendMessage(message, "user");
            input.value = "";
            typingIndicator.style.display = "block";

            try {
                const data = await userMessageSendToBackend(message);
                appendMessage(data.response || "No response received from backend.", "bot");
            } catch (error) {
                console.error("Error sending message to backend:", error);
                appendMessage("Unable to connect to the backend. Please check if the server is running on http://localhost:3000.", "bot");
            } finally {
                typingIndicator.style.display = "none";
            }
        };

        sendButton.addEventListener("click", sendMessage);

        input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    });
</script>


</html>
